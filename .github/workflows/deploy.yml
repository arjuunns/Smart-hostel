name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy-frontend:
    name: Build & Deploy Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm ci

      - name: Build Frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: |
          cd frontend
          npm run build

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to S3
        run: |
          aws s3 sync frontend/dist/ s3://${{ secrets.AWS_S3_BUCKET }} --delete

      - name: Invalidate CloudFront Cache
        run: |
          aws cloudfront create-invalidation --distribution-id ${{ secrets.AWS_CLOUDFRONT_DISTRIBUTION_ID }} --paths "/*"

  deploy-backend:
    name: Deploy Backend to EC2
    runs-on: ubuntu-latest
    needs: deploy-frontend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Deploy via SSH to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            # Navigate to the app directory
            cd ~/Smart-hostel || cd ~/smart-hostel || mkdir -p ~/smart-hostel && cd ~/smart-hostel
            
            # Pull latest changes from the repository
            if [ -d .git ]; then
              git pull origin main
            else
              git clone https://github.com/${{ github.repository }}.git .
            fi

            # Set up Environment variables on EC2 if they don't exist
            echo "PORT=5000" > backend/.env
            echo "DATABASE_URL=\"${{ secrets.DATABASE_URL }}\"" >> backend/.env
            echo "JWT_SECRET=\"${{ secrets.JWT_SECRET }}\"" >> backend/.env

            # Navigate to backend
            cd backend
            
            # Install backend dependencies
            npm install --production

            # Generate Prisma Client
            npx prisma generate

            # Push schema changes to Neon DB
            npx prisma db push

            # Restart/Start application process with PM2
            pm2 restart smart-hostel-api || pm2 start server.js --name "smart-hostel-api"
