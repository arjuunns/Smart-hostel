  deploy-backend:
    name: Deploy Backend to EC2
    runs-on: ubuntu-latest


    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Copy Backend to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          source: "backend/**"
          target: "~/smart-hostel"

      - name: Run Backend Setup on EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            # 1. Load NVM if it exists (handles path issues in non-interactive shells)
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            # 2. Self-Healing: Install Node.js/NPM if completely missing
            if ! command -v npm &> /dev/null; then
              echo "npm not found. Attempting package manager installation..."
              sudo apt-get update && sudo apt-get install -y nodejs npm
            fi

            # 3. Self-Healing: Install PM2 if missing
            if ! command -v pm2 &> /dev/null; then
              echo "pm2 not found. Installing globally..."
              sudo npm install -g pm2
            fi

            # Navigate to the backend directory on EC2
            cd ~/smart-hostel/backend

            # Create/Overwrite the environment config
            echo "PORT=5000" > .env
            echo "DATABASE_URL=\"${{ secrets.DATABASE_URL }}\"" >> .env
            echo "JWT_SECRET=\"${{ secrets.JWT_SECRET }}\"" >> .env

            # Install production dependencies
            npm install --production

            # Generate Prisma Client
            npx prisma generate

            # Synchronize database schema with Neon
            npx prisma db push

            # Restart/Start backend using PM2
            pm2 restart smart-hostel-api || pm2 start server.js --name "smart-hostel-api"
